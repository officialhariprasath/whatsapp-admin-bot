<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Offline - WA Admin Bot</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 460px;
      border: 1px solid #334155;
      background: #111827;
      border-radius: 12px;
      padding: 24px;
    }
    h1 { margin: 0 0 10px; font-size: 1.3rem; }
    p { margin: 0; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You are offline</h1>
    <p>Reconnect to load live dashboard data and API actions.</p>
  </div>
</body>
</html>
